name: 全平台发布

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "发布标签（例如 v0.1.12）"
        required: true
        type: string
      ref:
        description: "要构建的 Git 引用 / 分支 / SHA"
        required: false
        default: "main"
        type: string
      run_verify:
        description: "在构建产物前先执行质量闸门"
        required: false
        default: true
        type: boolean
      prerelease:
        description: "预发布通道覆盖（auto/true/false）"
        required: false
        default: auto
        type: choice
        options:
          - auto
          - true
          - false

permissions:
  contents: write

env:
  TAURI_CLI_VERSION: 2.10.1
  CARGO_TARGET_DIR: ${{ github.workspace }}/target-shared

concurrency:
  group: ${{ format('{0}-tag-{1}', github.workflow, startsWith(github.event.inputs.tag, 'v') && github.event.inputs.tag || format('v{0}', github.event.inputs.tag)) }}
  cancel-in-progress: false

jobs:
  validate_release_version:
    runs-on: ubuntu-22.04

    steps:
      - name: 检出代码
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}

      - name: 校验发布版本
        uses: ./.github/actions/validate-release-version
        with:
          tag: ${{ github.event.inputs.tag }}

  verify:
    needs: validate_release_version
    if: ${{ github.event.inputs.run_verify != 'false' }}
    runs-on: ubuntu-22.04

    steps:
      - name: 检出代码
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}

      - name: 准备发布环境
        uses: ./.github/actions/setup-release-env

      - name: 安装前端依赖
        working-directory: apps
        run: pnpm install --frozen-lockfile

      - name: 运行 Rust 测试
        run: cargo test --workspace

      - name: 运行前端 Lint
        working-directory: apps
        run: pnpm lint

      - name: 构建前端
        working-directory: apps
        run: pnpm run build:desktop

      - name: 打包前端 dist 制品
        shell: bash
        run: |
          set -euo pipefail
          test -f apps/out/index.html || { echo "未找到 apps/out/index.html"; exit 1; }
          rm -f frontend-dist.tar.gz
          tar -czf frontend-dist.tar.gz -C apps out

      - name: 上传前端 dist 制品
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: codexmanager-frontend-dist
          path: frontend-dist.tar.gz
          if-no-files-found: error
          compression-level: 0

  build_windows:
    needs: [validate_release_version, verify]
    if: ${{ always() && needs.validate_release_version.result == 'success' && (needs.verify.result == 'success' || needs.verify.result == 'skipped') }}
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}

      - name: 准备发布环境
        uses: ./.github/actions/setup-release-env
        with:
          enable-pnpm-cache: "false"
          enable-rust-cache: "false"

      - name: 准备前端 dist
        uses: ./.github/actions/prepare-frontend-dist
        with:
          verify-result: ${{ needs.verify.result }}

      - name: 禁用 Tauri 打包前的重复前端重建
        shell: pwsh
        run: ./scripts/release/disable-tauri-before-build.ps1

      - name: 构建 Tauri 安装包（带重试）
        uses: ./.github/actions/build-tauri-with-retry
        with:
          working-directory: apps
          tauri-cli-version: ${{ env.TAURI_CLI_VERSION }}
          bundles: nsis
          shell-type: pwsh

      - name: 整理桌面端发布资产
        shell: pwsh
        run: |
          $releaseDir = Join-Path "${{ env.CARGO_TARGET_DIR }}" "release"
          $bundleDir = Join-Path $releaseDir "bundle"
          $portableDir = Join-Path $releaseDir "portable"
          $desktopAssetsDir = Join-Path $releaseDir "release-assets"
          $version = (Get-Content "apps/src-tauri/tauri.conf.json" -Raw | ConvertFrom-Json).version
          $arch = if ("${{ runner.arch }}" -eq "ARM64") { "arm64" } else { "x64" }
          New-Item -ItemType Directory -Force $portableDir | Out-Null
          Remove-Item -Recurse -Force $desktopAssetsDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force $desktopAssetsDir | Out-Null

          $source = Join-Path $releaseDir "CodexManager.exe"
          if (-not (Test-Path $source -PathType Leaf)) {
            throw "未找到便携版源二进制：$source"
          }

          $portableBinary = Join-Path $portableDir "CodexManager-portable.exe"
          Copy-Item -Force $source $portableBinary
          Write-Host "便携版二进制：$portableBinary"

          $installerSource = Get-ChildItem -Path $bundleDir -Recurse -File |
            Where-Object { $_.Name -like "*-setup.exe" -and $_.Name -notlike "*portable*" } |
            Sort-Object FullName |
            Select-Object -First 1
          if (-not $installerSource) {
            throw "未在以下目录找到 Windows 安装包：$bundleDir"
          }

          $installerTarget = Join-Path $desktopAssetsDir "CodexManager_${version}_${arch}-setup.exe"
          Copy-Item -Force $installerSource.FullName $installerTarget
          Copy-Item -Force $portableBinary (Join-Path $desktopAssetsDir "CodexManager-portable.exe")
          Get-ChildItem -Path $desktopAssetsDir -File | ForEach-Object {
            Write-Host "桌面端资产：$($_.FullName)"
          }

      - name: 构建服务端二进制
        shell: pwsh
        run: |
          cargo build -p codexmanager-service --release
          cargo build -p codexmanager-web --release --features embedded-ui
          cargo build -p codexmanager-start --release

      - name: 整理服务端发布包
        uses: ./.github/actions/stage-service-package
        with:
          platform: windows
          arch: ${{ runner.arch == 'X64' && 'x86_64' || runner.arch == 'ARM64' && 'arm64' || runner.arch }}
          stage-root: stage
          release-dir: ${{ env.CARGO_TARGET_DIR }}/release
          binary-extension: .exe
          shell-type: pwsh

      - name: 上传桌面端制品
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: codexmanager-windows
          path: ${{ env.CARGO_TARGET_DIR }}/release/release-assets/*.exe
          if-no-files-found: error
          compression-level: 0

      - name: 上传服务端制品
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: codexmanager-service-windows
          path: stage/*.zip
          if-no-files-found: error
          compression-level: 0

  build_macos_beta:
    needs: [validate_release_version, verify]
    if: ${{ always() && needs.validate_release_version.result == 'success' && (needs.verify.result == 'success' || needs.verify.result == 'skipped') }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            rust_target: aarch64-apple-darwin
          - arch: x64
            rust_target: x86_64-apple-darwin

    steps:
      - name: 检出代码
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}

      - name: 准备发布环境
        uses: ./.github/actions/setup-release-env
        with:
          rust-target: ${{ matrix.rust_target }}
          enable-pnpm-cache: "false"
          enable-rust-cache: "false"

      - name: 准备前端 dist
        uses: ./.github/actions/prepare-frontend-dist
        with:
          verify-result: ${{ needs.verify.result }}

      - name: 禁用 Tauri 打包前的重复前端重建
        shell: pwsh
        run: ./scripts/release/disable-tauri-before-build.ps1

      - name: 构建 macOS 应用包
        uses: ./.github/actions/build-tauri-with-retry
        with:
          working-directory: apps
          tauri-cli-version: ${{ env.TAURI_CLI_VERSION }}
          bundles: app
          target: ${{ matrix.rust_target }}
          shell-type: bash

      - name: 重新生成带首次启动辅助的 macOS dmg
        shell: bash
        run: |
          set -euo pipefail

          release_dir="${{ env.CARGO_TARGET_DIR }}/${{ matrix.rust_target }}/release"
          bundle_root="${release_dir}/bundle"
          test -d "$bundle_root" || { echo "未找到 macOS bundle 根目录：$bundle_root"; exit 1; }

          bundle_dir="$(find "$bundle_root" -type d -path '*/CodexManager.app' | head -n 1)"
          test -n "$bundle_dir" || { echo "未在以下目录找到 macOS 应用包：$bundle_root"; exit 1; }

          dmg_dir="${bundle_root}/dmg"
          mkdir -p "$dmg_dir"
          find "$dmg_dir" -type f -name '*.dmg' -delete

          if [ "${{ matrix.arch }}" = "arm64" ]; then
            dmg_arch="aarch64"
          else
            dmg_arch="x64"
          fi

          version="$(python3 -c 'import json, pathlib; print(json.loads(pathlib.Path("apps/src-tauri/tauri.conf.json").read_text(encoding="utf-8"))["version"])')"

          stage_dir="$(mktemp -d)"
          temp_dir="$(mktemp -d)"
          trap 'rm -rf "$stage_dir" "$temp_dir"' EXIT

          ditto "$bundle_dir" "$stage_dir/CodexManager.app"
          ln -s /Applications "$stage_dir/Applications"
          install -m 0755 "assets/macos/Open CodexManager.command" "$stage_dir/Open CodexManager.command"
          install -m 0644 "assets/macos/README-macOS-first-launch.txt" "$stage_dir/README-macOS-first-launch.txt"

          codesign --force --deep --sign - "$stage_dir/CodexManager.app"
          codesign --verify --deep --strict "$stage_dir/CodexManager.app"

          dmg_path="${dmg_dir}/CodexManager_${version}_${dmg_arch}.dmg"
          temp_dmg_path="${temp_dir}/CodexManager_${version}_${dmg_arch}.dmg"
          created=false
          for attempt in 1 2 3; do
            rm -f "$temp_dmg_path"
            hdiutil detach "/Volumes/CodexManager" -force >/dev/null 2>&1 || true
            sync || true
            sleep "$attempt"
            if hdiutil create -volname "CodexManager" -srcfolder "$stage_dir" -ov -format UDZO "$temp_dmg_path"; then
              created=true
              break
            fi
            echo "第 ${attempt} 次执行 hdiutil create 失败，准备重试……"
          done

          $created || { echo "多次重试后仍未能生成 macOS dmg"; exit 1; }
          mv -f "$temp_dmg_path" "$dmg_path"
          test -f "$dmg_path" || { echo "未生成 macOS dmg：$dmg_path"; exit 1; }

      - name: 整理旧版 macOS 便携包
        if: ${{ matrix.arch == 'x64' }}
        shell: bash
        run: |
          set -euo pipefail

          release_dir="${{ env.CARGO_TARGET_DIR }}/${{ matrix.rust_target }}/release"
          bundle_root="${release_dir}/bundle"
          test -d "$bundle_root" || { echo "未找到 macOS bundle 根目录：$bundle_root"; exit 1; }

          bundle_dir="$(find "$bundle_root" -type d -path '*/CodexManager.app' | head -n 1)"
          test -n "$bundle_dir" || { echo "未在以下目录找到 macOS 应用包：$bundle_root"; exit 1; }

          portable_dir="${release_dir}/portable"
          mkdir -p "$portable_dir"

          zip_path="${portable_dir}/CodexManager-macos-portable.zip"
          rm -f "$zip_path"
          ditto -c -k --sequesterRsrc --keepParent "$bundle_dir" "$zip_path"
          echo "旧版便携压缩包：$zip_path"
          echo "源应用包：$bundle_dir"

      - name: 构建服务端二进制
        run: |
          cargo build -p codexmanager-service --release --target ${{ matrix.rust_target }}
          cargo build -p codexmanager-web --release --features embedded-ui --target ${{ matrix.rust_target }}
          cargo build -p codexmanager-start --release --target ${{ matrix.rust_target }}

      - name: 整理服务端发布包
        uses: ./.github/actions/stage-service-package
        with:
          platform: macos
          arch: ${{ matrix.arch }}
          stage-root: stage
          release-dir: ${{ env.CARGO_TARGET_DIR }}/${{ matrix.rust_target }}/release
          shell-type: bash

      - name: 上传桌面端制品
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: codexmanager-macos-${{ matrix.arch }}
          path: |
            ${{ env.CARGO_TARGET_DIR }}/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg
            ${{ env.CARGO_TARGET_DIR }}/${{ matrix.rust_target }}/release/portable/*.zip
          if-no-files-found: error
          compression-level: 0

      - name: 上传服务端制品
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: codexmanager-service-macos-${{ matrix.arch }}
          path: stage/*.zip
          if-no-files-found: error
          compression-level: 0

  build_linux:
    needs: [validate_release_version, verify]
    if: ${{ always() && needs.validate_release_version.result == 'success' && (needs.verify.result == 'success' || needs.verify.result == 'skipped') }}
    runs-on: ubuntu-22.04

    steps:
      - name: 检出代码
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}

      - name: 准备发布环境
        uses: ./.github/actions/setup-release-env
        with:
          enable-pnpm-cache: "false"
          enable-rust-cache: "false"

      - name: 安装 Linux 依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev zip

      - name: 准备前端 dist
        uses: ./.github/actions/prepare-frontend-dist
        with:
          verify-result: ${{ needs.verify.result }}

      - name: 禁用 Tauri 打包前的重复前端重建
        shell: pwsh
        run: ./scripts/release/disable-tauri-before-build.ps1

      - name: 构建 Tauri 安装包（带重试）
        uses: ./.github/actions/build-tauri-with-retry
        with:
          working-directory: apps
          tauri-cli-version: ${{ env.TAURI_CLI_VERSION }}
          bundles: appimage,deb
          shell-type: bash

      - name: 整理便携包
        shell: bash
        run: |
          release_dir="${{ env.CARGO_TARGET_DIR }}/release"
          portable_dir="$release_dir/portable"
          mkdir -p "$portable_dir"

          source_bin="$release_dir/CodexManager"
          if [[ ! -f "$source_bin" ]]; then
            echo "未找到便携版源二进制：$source_bin"
            exit 1
          fi

          portable_bin="$portable_dir/CodexManager-portable"
          cp -f "$source_bin" "$portable_bin"
          chmod +x "$portable_bin"

          zip_path="$portable_dir/CodexManager-linux-portable.zip"
          rm -f "$zip_path"
          (
            cd "$portable_dir"
            zip -q "CodexManager-linux-portable.zip" "CodexManager-portable"
          )
          echo "便携包：$zip_path"

      - name: 构建服务端二进制
        run: |
          cargo build -p codexmanager-service --release
          cargo build -p codexmanager-web --release --features embedded-ui
          cargo build -p codexmanager-start --release

      - name: 整理服务端发布包
        uses: ./.github/actions/stage-service-package
        with:
          platform: linux
          arch: x86_64
          stage-root: stage
          release-dir: ${{ env.CARGO_TARGET_DIR }}/release
          shell-type: bash

      - name: 上传桌面端制品
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: codexmanager-linux
          path: |
            ${{ env.CARGO_TARGET_DIR }}/release/bundle/**/*.AppImage
            ${{ env.CARGO_TARGET_DIR }}/release/bundle/**/*.deb
            ${{ env.CARGO_TARGET_DIR }}/release/portable/*.zip
          if-no-files-found: error
          compression-level: 0

      - name: 上传服务端制品
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: codexmanager-service-linux
          path: stage/*.zip
          if-no-files-found: error
          compression-level: 0

  release:
    needs: [build_windows, build_macos_beta, build_linux]
    if: ${{ needs.build_windows.result == 'success' && needs.build_macos_beta.result == 'success' && needs.build_linux.result == 'success' }}
    runs-on: ubuntu-22.04

    steps:
      - name: 检出代码
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}

      - name: 下载构建产物
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: codexmanager-*
          merge-multiple: true
          path: release-assets

      - name: 列出发布资产
        run: find release-assets -type f | sort

      - name: 发布 GitHub Release
        uses: ./.github/actions/publish-github-release
        with:
          tag: ${{ github.event.inputs.tag }}
          ref: ${{ github.event.inputs.ref || 'main' }}
          prerelease-input: ${{ github.event.inputs.prerelease || 'auto' }}
          assets-dir: release-assets
