name: setup-release-env
description: Setup pnpm, Node.js, Rust toolchain, and Rust cache for release jobs.

inputs:
  node-version:
    description: Node.js version to install.
    required: false
    default: "22.22.0"
  pnpm-version:
    description: pnpm version to install.
    required: false
    default: "10.30.3"
  pnpm-lock-path:
    description: Lockfile path used for pnpm cache.
    required: false
    default: |
      apps/pnpm-lock.yaml
      .github/workflows/release-all.yml
  enable-pnpm-cache:
    description: Enable pnpm store cache through actions/setup-node.
    required: false
    default: "true"
  rust-toolchain:
    description: Rust toolchain channel.
    required: false
    default: stable
  rust-target:
    description: Optional Rust target triple.
    required: false
    default: ""
  rust-cache-shared-key:
    description: Shared rust-cache key.
    required: false
    default: release-all-platforms-rust-stable-v1
  enable-rust-cache:
    description: Enable rust-cache for Cargo registry and related caches.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
      with:
        version: ${{ inputs.pnpm-version }}
        run_install: false

    - name: Setup Node.js with pnpm cache
      if: ${{ inputs.enable-pnpm-cache == 'true' }}
      uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        cache-dependency-path: ${{ inputs.pnpm-lock-path }}

    - name: Setup Node.js
      if: ${{ inputs.enable-pnpm-cache != 'true' }}
      uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
      with:
        node-version: ${{ inputs.node-version }}

    - name: Setup Rust
      if: ${{ inputs.rust-target == '' }}
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      with:
        toolchain: ${{ inputs.rust-toolchain }}

    - name: Setup Rust target
      if: ${{ inputs.rust-target != '' }}
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      with:
        toolchain: ${{ inputs.rust-toolchain }}
        targets: ${{ inputs.rust-target }}

    - name: Cache Rust dependencies
      if: ${{ inputs.enable-rust-cache == 'true' }}
      uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
      with:
        shared-key: ${{ inputs.rust-cache-shared-key }}
        cache-targets: false
